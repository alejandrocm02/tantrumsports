<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito | TantrumSports</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #686868;
      --line: #dedbd2;
      --paper: #f8f6ef;
      --panel: #ffffff;
      --accent: #0e8f7d;
      --accent-dark: #086457;
      --danger: #b23b3b;
      --shadow: 0 16px 45px rgba(31, 29, 24, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scrollbar-color: var(--accent) #e9e5da;
      scrollbar-width: thin;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px clamp(18px, 4vw, 54px);
      border-bottom: 1px solid rgba(23, 23, 23, 0.08);
      background: rgba(248, 246, 239, 0.94);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-weight: 800;
      font-size: 1.05rem;
      text-decoration: none;
    }

    .brand-mark {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--ink);
    }

    main {
      width: min(1120px, calc(100% - 36px));
      margin: 0 auto;
      padding: 34px 0 56px;
    }

    .page-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 5.2rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .page-head p {
      max-width: 470px;
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .items,
    .summary,
    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 22px rgba(31, 29, 24, 0.06);
    }

    .item {
      display: grid;
      grid-template-columns: 108px minmax(0, 1fr) auto;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .item:last-child {
      border-bottom: 0;
    }

    .item img {
      width: 108px;
      height: 108px;
      border-radius: 8px;
      object-fit: contain;
      background: #f1eee7;
    }

    .item h2 {
      margin: 0 0 7px;
      font-size: 1.08rem;
      line-height: 1.25;
    }

    .item p {
      margin: 0;
      color: var(--muted);
    }

    .item strong {
      display: block;
      margin-top: 12px;
      font-size: 1.14rem;
    }

    .line-actions {
      display: grid;
      gap: 10px;
      justify-items: end;
      align-content: start;
    }

    .qty {
      display: grid;
      grid-template-columns: 34px 42px 34px;
      min-height: 38px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .qty button,
    .icon-button {
      border: 0;
      background: #fff;
      cursor: pointer;
      font-weight: 900;
    }

    .qty span {
      display: grid;
      place-items: center;
      border-inline: 1px solid var(--line);
      font-weight: 800;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--danger);
    }

    .icon-button:hover {
      border-color: var(--danger);
      background: #fff4f4;
    }

    .summary {
      padding: 18px;
      position: sticky;
      top: 82px;
    }

    .summary h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .row.total {
      color: var(--ink);
      border-bottom: 0;
      font-size: 1.2rem;
      font-weight: 820;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      font-weight: 760;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: var(--accent-dark);
    }

    .button.secondary {
      color: var(--ink);
      border: 1px solid var(--line);
      background: #fff;
    }

    .button.secondary:hover {
      background: #ece8dc;
    }

    .button.danger {
      background: var(--danger);
    }

    .empty {
      padding: 28px;
      text-align: center;
    }

    .empty h2 {
      margin: 0 0 8px;
    }

    .empty p {
      margin: 0 auto 18px;
      max-width: 430px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      .page-head,
      .layout {
        grid-template-columns: 1fr;
      }

      .page-head {
        align-items: start;
        flex-direction: column;
      }

      .summary {
        position: static;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .item {
        grid-template-columns: 86px minmax(0, 1fr);
      }

      .item img {
        width: 86px;
        height: 86px;
      }

      .line-actions {
        grid-column: 2;
        justify-items: start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html#inicio" aria-label="TantrumSports - volver al inicio">
      <span class="brand-mark">TS</span>
      <span>TantrumSports</span>
    </a>
    <button class="button secondary" type="button" id="continueTop">Seguir comprando</button>
  </header>

  <main>
    <section class="page-head" aria-labelledby="cart-title">
      <div>
        <h1 id="cart-title">Carrito</h1>
        <p>Revisa tallas, ajusta unidades y confirma el resumen antes de pagar.</p>
      </div>
    </section>

    <section class="layout" id="cartLayout">
      <div class="items" id="cartItems"></div>

      <aside class="summary" aria-live="polite">
        <h2>Resumen</h2>
        <div class="row"><span>Unidades</span><strong id="itemsCount">0</strong></div>
        <div class="row"><span>Subtotal</span><strong id="subtotal">0 EUR</strong></div>
        <div class="row"><span>Envio</span><strong id="shipping">0 EUR</strong></div>
        <div class="row total"><span>Total</span><strong id="total">0 EUR</strong></div>
        <div class="actions">
          <button class="button" type="button" id="payButton">Pagar ahora</button>
          <button class="button secondary" type="button" id="continueButton">Seguir comprando</button>
          <button class="button danger" type="button" id="clearButton">Vaciar carrito</button>
        </div>
      </aside>
    </section>

    <section class="empty" id="emptyState" hidden>
      <h2>Tu carrito esta vacio</h2>
      <p>Vuelve al catalogo y anade algun modelo de Nike, Adidas, Puma, New Balance o Salomon.</p>
      <button class="button" type="button" id="emptyContinue">Volver a la tienda</button>
    </section>
  </main>

  <script>
    const storageKey = "tantrumSportsCart";
    const cartItems = document.querySelector("#cartItems");
    const cartLayout = document.querySelector("#cartLayout");
    const emptyState = document.querySelector("#emptyState");
    const itemsCount = document.querySelector("#itemsCount");
    const subtotalEl = document.querySelector("#subtotal");
    const shippingEl = document.querySelector("#shipping");
    const totalEl = document.querySelector("#total");

    let cart = normalizeCart(JSON.parse(localStorage.getItem(storageKey) || "[]"));

    function normalizeCart(items) {
      return items.map((item) => ({ ...item, qty: Number(item.qty || 1), stock: Number(item.stock || 12) }));
    }

    function formatEuro(value) {
      return `${value} EUR`;
    }

    function saveCart() {
      localStorage.setItem(storageKey, JSON.stringify(cart));
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: "tantrumSportsCartUpdated" }, "*");
      }
    }

    function goShopping() {
      if (window.opener && !window.opener.closed) {
        window.opener.focus();
        window.close();
        return;
      }

      if (window.history.length > 1) {
        window.history.back();
        return;
      }

      window.location.href = "index.html#catalogo";
    }

    function renderCart() {
      const units = cart.reduce((sum, item) => sum + item.qty, 0);
      const subtotal = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      const shipping = subtotal === 0 || subtotal >= 150 ? 0 : 6;

      cartLayout.hidden = cart.length === 0;
      emptyState.hidden = cart.length !== 0;
      itemsCount.textContent = units;
      subtotalEl.textContent = formatEuro(subtotal);
      shippingEl.textContent = formatEuro(shipping);
      totalEl.textContent = formatEuro(subtotal + shipping);

      cartItems.innerHTML = cart.map((item, index) => `
        <article class="item">
          <img src="${item.image}" alt="${item.name}" />
          <div>
            <h2>${item.name}</h2>
            <p>${item.brand} - Talla EU ${item.size}</p>
            <strong>${formatEuro(item.price)} x ${item.qty}</strong>
          </div>
          <div class="line-actions">
            <div class="qty" aria-label="Unidades para ${item.name}">
              <button type="button" data-action="minus" data-index="${index}">-</button>
              <span>${item.qty}</span>
              <button type="button" data-action="plus" data-index="${index}">+</button>
            </div>
            <button class="icon-button" type="button" data-action="remove" data-index="${index}" aria-label="Eliminar ${item.name}">X</button>
          </div>
        </article>
      `).join("");
    }

    cartItems.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;

      const index = Number(button.dataset.index);
      const item = cart[index];

      if (button.dataset.action === "remove") {
        cart.splice(index, 1);
      }

      if (button.dataset.action === "plus") {
        item.qty = Math.min(item.stock, item.qty + 1);
      }

      if (button.dataset.action === "minus") {
        item.qty -= 1;
        if (item.qty <= 0) cart.splice(index, 1);
      }

      saveCart();
      renderCart();
    });

    document.querySelector("#clearButton").addEventListener("click", () => {
      cart = [];
      saveCart();
      renderCart();
    });

    document.querySelector("#payButton").addEventListener("click", () => {
      if (cart.length === 0) return;
      alert("Pedido preparado. En una tienda real aqui iria la pasarela de pago.");
    });

    document.querySelector("#continueButton").addEventListener("click", goShopping);
    document.querySelector("#continueTop").addEventListener("click", goShopping);
    document.querySelector("#emptyContinue").addEventListener("click", goShopping);

    saveCart();
    renderCart();
  </script>
</body>
</html>
